<html>
<head>
    <title>log in</title>
    <style>
        body {
            background-color: black;
        }
        form {
            color: whitesmoke;
            text-align: center;
            font-family: cursive;
            font-size: 35px;
        }
        nav{
            text-align: center;
        }
        nav a{
            color: white;
            font-family: cursive;
            font-size: 35px;
            padding-right: 10px;
        }
    </style>
</head>
<body>
    <header>
        <nav>
            <a href="index.html">main</a>
            <a href="log.html">login</a>
        </nav>
    </header>
    <main>
        <form>
            <label for="username">enter your username</label>
            <br>
            <input style="font-size: 40px;" type="text" name="username" id="username">
            <br>
            <label for="lastname">enter your lastname</label>
            <br>
            <input style="font-size: 40px;" type="text" name="lastname" id="lastname">
            <br>
            <label for="email">enter your email</label>
            <br>
            <input style="font-size: 40px;" type="email" name="email" id="email">
            <br>
            <label for="age">enter your age</label>
            <br>
            <input style="font-size: 40px;" type="number" name="age" id="age">
            <br>
            <label for="gender">male</label>
            <input style="font-size: 40px;" type="radio" name="gender" id="gender" value="male">
            <label for="gender2">female</label>
            <input style="font-size: 40px;" type="radio" name="gender" id="gender2" value="female">
            <br>
            <input style="font-size: 40px;" type="submit">
        </form>
    </main>
</body>
</html>
