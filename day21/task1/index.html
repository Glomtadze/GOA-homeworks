<!--radio input შეიძლება გამოიყენოთ ისეთ მომენტში როდესაც საიტზე ჩვენს სქესს გადახდის ტიპს ან მიწოდების სერვისს გვეკითხებიან-->
<!--select-ყველგან შეიძლება გამოვიყენოთ სადაც რაიმეს არჩევას გვთხოვენ -->
<html>

<head>
</head>

<body>
    <form>
        <label for="gender">male</label>
        <input type="radio" name="gender" id="male" value="male">
        <label for="gender">female</label>
        <input type="radio" name="gender" id="female" value="female">
        <br>
        <input type="submit">
    </form>
    <!--select-ატირბუტი აკეთებს სიას სადაც მომხმარებელს არჩევა შეუძლია გარკვეული რამის-->
    <form>
        <label for="countries">countries</label>
        <select name="countries" id="countries">
            <option value="Georgia">Georgia</option>
            <option value="spain">spain</option>
            <option value="france">France</option>
            <option value="usa">usa</option>
            <option value="japan">japan</option>
        </select>
        <input type="submit">

    </form>


</body>

</html>
